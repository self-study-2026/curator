repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types_or: [ python, pyi ]
        pass_filenames: true
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest-coverage
        entry: uv run pytest --cov=src --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true
        types: [ python ]
